<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>memora 共香研究所 — 你和寵物的香氛性格測驗</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF6F0;
    --warm: #F2E8D9;
    --sand: #E8D9C0;
    --brown: #8B6F47;
    --dark: #2C1F0E;
    --accent: #C4956A;
    --text: #3D2B1F;
    --muted: #9B8474;
    --light-border: rgba(139,111,71,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: var(--cream);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 15% 15%, rgba(196,149,106,0.09) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 85%, rgba(122,158,126,0.08) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }
  .page {
    position: relative;
    z-index: 1;
    max-width: 600px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }
  .screen { display: none; }
  .screen.active { display: block; }

  .paw-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .paw-bg svg { position: absolute; color: var(--accent); opacity: 0.045; }

  /* INTRO */
  .intro-wrap {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 60px 0 40px;
  }
  .intro-animals {
    display: flex; align-items: flex-end;
    justify-content: center; gap: 16px; margin-bottom: 32px;
  }
  .intro-tag { font-family: 'Noto Serif TC', serif; font-size: 11px; letter-spacing: 0.25em; color: var(--accent); margin-bottom: 14px; }
  .intro-title { font-family: 'Noto Serif TC', serif; font-size: 28px; font-weight: 400; color: var(--dark); line-height: 1.55; margin-bottom: 14px; letter-spacing: 0.04em; }
  .intro-desc { font-size: 15px; color: var(--muted); line-height: 1.9; margin-bottom: 36px; max-width: 360px; }
  .btn-start { background: var(--dark); color: var(--cream); border: none; border-radius: 40px; padding: 15px 52px; font-size: 15px; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; letter-spacing: 0.08em; transition: background 0.2s, transform 0.15s; }
  .btn-start:hover { background: var(--brown); transform: translateY(-2px); }
  .btn-start:active { transform: scale(0.98); }
  .intro-note { font-size: 13px; color: var(--muted); margin-top: 14px; opacity: 0.65; }
  .intro-paws { display: flex; justify-content: center; gap: 10px; margin-top: 28px; }
  .brand-logo { display: flex; flex-direction: column; align-items: center; margin-bottom: 28px; }
  .brand-en { font-family: 'Noto Serif TC', serif; font-size: 22px; font-weight: 300; letter-spacing: 0.22em; color: var(--dark); }
  .brand-zh { font-size: 12px; letter-spacing: 0.3em; color: var(--muted); margin-top: 4px; }
  .brand-line { width: 32px; height: 1px; background: var(--accent); margin: 8px auto 0; opacity: 0.5; }
  .result-brand { text-align: center; margin-top: 36px; padding-top: 28px; border-top: 1px solid var(--light-border); }
  .result-brand-en { font-family: 'Noto Serif TC', serif; font-size: 16px; font-weight: 300; letter-spacing: 0.2em; color: var(--dark); }
  .result-brand-zh { font-size: 11px; letter-spacing: 0.25em; color: var(--muted); margin-top: 4px; opacity: 0.7; }

  /* QUIZ */
  .quiz-top { padding: 32px 0 0; margin-bottom: 24px; }
  .progress-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .progress-section { font-size: 12px; letter-spacing: 0.1em; color: var(--muted); }
  .progress-track { height: 2px; background: var(--sand); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
  .question-num { font-family: 'Noto Serif TC', serif; font-size: 11px; letter-spacing: 0.2em; color: var(--accent); margin-bottom: 10px; }
  .question-animal { float: right; margin: -4px 0 8px 16px; opacity: 0.8; }
  .question-text { font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 400; color: var(--dark); line-height: 1.7; margin-bottom: 24px; letter-spacing: 0.02em; overflow: hidden; }
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .opt-btn { background: #fff; border: 1px solid var(--light-border); border-radius: 14px; padding: 15px 44px 15px 20px; text-align: left; font-size: 14.5px; font-family: 'Noto Sans TC', sans-serif; color: var(--text); cursor: pointer; line-height: 1.6; transition: border-color 0.18s, background 0.18s, transform 0.12s; position: relative; }
  .opt-btn:hover { border-color: rgba(196,149,106,0.5); background: rgba(250,246,240,0.9); transform: translateX(4px); }
  .opt-btn.selected { border-color: var(--accent); background: rgba(196,149,106,0.08); color: var(--brown); }
  .opt-btn.selected::after { content: '✓'; position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: var(--accent); font-size: 14px; }
  .nav-row { display: flex; justify-content: space-between; align-items: center; padding-bottom: 40px; }
  .btn-back { background: transparent; border: 1px solid var(--light-border); border-radius: 30px; padding: 11px 22px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; color: var(--muted); cursor: pointer; transition: border-color 0.2s, color 0.2s; }
  .btn-back:hover { border-color: var(--accent); color: var(--brown); }
  .btn-next { background: var(--dark); color: var(--cream); border: none; border-radius: 30px; padding: 13px 36px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; letter-spacing: 0.06em; transition: background 0.2s, opacity 0.2s, transform 0.12s; }
  .btn-next:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-next:not(:disabled):hover { background: var(--brown); transform: translateY(-1px); }

  /* RESULT */
  .result-wrap { padding: 40px 0 60px; }
  .result-header { text-align: center; margin-bottom: 32px; }
  .result-eyebrow { font-size: 11px; letter-spacing: 0.25em; color: var(--accent); margin-bottom: 20px; }
  .result-duo { display: flex; align-items: flex-end; justify-content: center; gap: 20px; margin-bottom: 24px; }
  .result-name { font-family: 'Noto Serif TC', serif; font-size: 30px; font-weight: 400; letter-spacing: 0.05em; margin-bottom: 8px; }
  .result-sub { font-size: 14px; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 20px; }
  .result-divider { width: 40px; height: 1px; background: var(--accent); margin: 0 auto 28px; opacity: 0.45; }
  .result-desc { font-size: 15px; line-height: 1.95; color: var(--text); text-align: center; margin-bottom: 36px; opacity: 0.85; }
  .info-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 32px; }
  .info-card { background: #fff; border: 1px solid var(--light-border); border-radius: 16px; padding: 20px 18px; }
  .info-card-label { font-size: 11px; letter-spacing: 0.2em; color: var(--accent); margin-bottom: 10px; }
  .info-card-val { font-family: 'Noto Serif TC', serif; font-size: 16px; color: var(--dark); line-height: 1.5; }
  .scent-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .scent-tag { background: rgba(196,149,106,0.1); color: var(--brown); border-radius: 99px; padding: 5px 14px; font-size: 13px; }
  .deco-row { display: flex; justify-content: center; gap: 16px; margin: 24px 0; opacity: 0.45; }
  .result-footer { text-align: center; }
  .btn-retry { background: transparent; border: 1px solid var(--light-border); border-radius: 30px; padding: 13px 32px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif; color: var(--muted); cursor: pointer; letter-spacing: 0.06em; transition: border-color 0.2s, color 0.2s; }
  .btn-retry:hover { border-color: var(--accent); color: var(--brown); }
  .share-hint { font-size: 12px; color: var(--muted); margin-top: 14px; opacity: 0.6; }
  .btn-share { background: var(--dark); color: var(--cream); border: none; border-radius: 30px; padding: 14px 36px; font-size: 15px; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; letter-spacing: 0.08em; margin-bottom: 12px; transition: background 0.2s, transform 0.15s; display: inline-flex; align-items: center; gap: 8px; }
  .btn-share:hover { background: var(--brown); transform: translateY(-1px); }
  .btn-share svg { width: 18px; height: 18px; }
  .share-row { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 16px; }
  .btn-share-native { background: transparent; border: 1px solid var(--light-border); border-radius: 30px; padding: 11px 28px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; color: var(--muted); cursor: pointer; letter-spacing: 0.06em; transition: border-color 0.2s, color 0.2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-share-native:hover { border-color: var(--accent); color: var(--brown); }
  .saving-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--dark); color: var(--cream); padding: 12px 28px; border-radius: 30px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }

  /* 專屬分享卡片 */
  .share-card {
    position: fixed;
    left: -9999px;
    top: 0;
    width: 600px;
    background: #FAF6F0;
    padding: 48px 40px 40px;
    font-family: 'Noto Sans TC', sans-serif;
    z-index: -1;
  }
  .share-card .sc-eyebrow { font-size: 12px; letter-spacing: 0.25em; color: #C4956A; text-align:center; margin-bottom:20px; }
  .share-card .sc-emoji-row { display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:20px; }
  .share-card .sc-emoji-circle { width:90px; height:90px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:44px; }
  .share-card .sc-name { font-family:'Noto Serif TC',serif; font-size:36px; font-weight:500; text-align:center; margin-bottom:8px; }
  .share-card .sc-sub { font-size:15px; letter-spacing:0.1em; text-align:center; margin-bottom:20px; color:#8B6F47; }
  .share-card .sc-divider { width:40px; height:1px; margin:0 auto 24px; }
  .share-card .sc-desc { font-size:16px; line-height:1.9; color:#3D2B1F; text-align:center; margin-bottom:28px; }
  .share-card .sc-cards { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:28px; }
  .share-card .sc-card { border-radius:14px; padding:18px; }
  .share-card .sc-card-label { font-size:11px; letter-spacing:0.2em; margin-bottom:10px; }
  .share-card .sc-card-val { font-family:'Noto Serif TC',serif; font-size:16px; color:#2C1F0E; line-height:1.5; }
  .share-card .sc-tag { border-radius:99px; padding:5px 14px; font-size:13px; margin-right:6px; display:inline-block; }
  .share-card .sc-logo-row { text-align:center; margin-top:24px; padding-top:20px; border-top:1px solid rgba(196,149,106,0.25); }

  .logo-img { width: 420px; opacity: 0.95; display: block; max-width: 92%; }
  .logo-wrap { display: flex; justify-content: center; margin-bottom: 28px; }
  .logo-wrap-sm { display: flex; justify-content: center; padding: 12px 0 8px; }
  .logo-wrap-sm .logo-img { width: 340px; opacity: 0.9; max-width: 88%; }
  .quiz-logo { display: flex; justify-content: center; padding: 28px 0 0; }
  .quiz-logo .logo-img { width: 300px; opacity: 0.85; max-width: 85%; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .fade-in { animation: fadeIn 0.4s ease; }
  .result-wrap { animation: fadeIn 0.6s ease; }
  @media(max-width:440px){ .intro-title{font-size:23px} .question-text{font-size:16px} .info-cards{grid-template-columns:1fr} }
</style>
</head>

let current=0,answers=[];

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function startQuiz(){ current=0;answers=[];showScreen('screen-quiz');renderQ(); }

function renderQ(){
  const pct=Math.round((current/questions.length)*100);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent=(current+1)+' / '+questions.length;
  document.getElementById('prog-pct').textContent=pct+'%';
  const q=questions[current],sel=answers[current]||null;
  const ani=qAnimals[current],sz=qSizes[current];
  document.getElementById('question-area').innerHTML=`
    <div class="fade-in">
      <div class="question-num">Q ${String(current+1).padStart(2,'0')}</div>
      <div class="question-text">
        <span class="question-animal"><svg width="${sz}" height="${sz}"><use href="#${ani}"/></svg></span>
        ${q.q}
      </div>
      <div class="options" id="opts">
        ${q.opts.map(o=>`<button class="opt-btn${sel===o.val?' selected':''}" onclick="pick('${o.val}',this)">${o.text}</button>`).join('')}
      </div>
      <div class="nav-row">
        ${current>0?`<button class="btn-back" onclick="back()">← 上一題</button>`:`<span></span>`}
        <button class="btn-next" id="btn-next" onclick="next()" ${sel?'':'disabled'}>${current===questions.length-1?'查看結果 →':'下一題 →'}</button>
      </div>
    </div>`;
}

function pick(val,btn){
  answers[current]=val;
  document.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('btn-next').disabled=false;
}
function next(){ if(!answers[current])return; current++; if(current>=questions.length){showResult();return;} renderQ(); }
function back(){ current--; renderQ(); }

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const chars = text.split('');
  let line = '';
  let testLine = '';
  let lineCount = 0;
  for (let i = 0; i < chars.length; i++) {
    testLine = line + chars[i];
    const metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && i > 0) {
      ctx.fillText(line, x, y + lineCount * lineHeight);
      line = chars[i];
      lineCount++;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x, y + lineCount * lineHeight);
}

async function saveImage() {
  const toast = document.getElementById('toast');
  toast.textContent = '正在產生圖片...';
  toast.style.opacity = '1';

  try {
    const canvas = await captureResult();
    if (!canvas) throw new Error('no canvas');

    const isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);

    if (isMobile && navigator.share) {
      // 手機：用 Web Share API 分享圖片
      canvas.toBlob(async (blob) => {
        try {
          const file = new File([blob], 'memora-結果.png', { type: 'image/png' });
          await navigator.share({
            title: 'memora 共香研究所',
            text: '我的香氛性格測驗結果！',
            files: [file]
          });
          toast.textContent = '分享成功！';
        } catch(e) {
          // 分享失敗，改用下載
          downloadCanvas(canvas);
        }
        setTimeout(() => { toast.style.opacity = '0'; }, 3000);
      }, 'image/png');
    } else {
      downloadCanvas(canvas);
      toast.textContent = isMobile ? '圖片已下載！長按儲存' : '圖片已儲存！';
      setTimeout(() => { toast.style.opacity = '0'; }, 3000);
    }
  } catch(e) {
    toast.textContent = '請截圖儲存結果';
    setTimeout(() => { toast.style.opacity = '0'; }, 3000);
  }
}

function downloadCanvas(canvas) {
  const link = document.createElement('a');
  link.download = 'memora-香氛性格測驗結果.png';
  link.href = canvas.toDataURL('image/png');
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

async function shareResult() {
  await saveImage();
}

async function sendToSheet(result, answers) {
  const url = 'https://script.google.com/macros/s/AKfycbwCjBkUiuAVN1JiY675YfsIlM5pEXTteiXAOEX7jrHfC6HrQIVV64bBhk6XdpuQWfNa/exec';
  const data = {
    result: result,
    q1: answers[0]||'', q2: answers[1]||'', q3: answers[2]||'',
    q4: answers[3]||'', q5: answers[4]||'', q6: answers[5]||'',
    q7: answers[6]||'', q8: answers[7]||'', q9: answers[8]||'',
    q10: answers[9]||'', q11: answers[10]||''
  };
  try {
    await fetch(url, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
  } catch(e) { console.log('送出失敗', e); }
}

async function shareResult() {
  if (navigator.share) {
    try {
      const toast = document.getElementById('toast');
      toast.textContent = '正在準備分享...';
      toast.style.opacity = '1';

      const canvas = await captureResult();

      canvas.toBlob(async (blob) => {
        const file = new File([blob], 'memora-結果.png', { type: 'image/png' });
        try {
          await navigator.share({
            title: 'memora 共香研究所 — 香氛性格測驗',
            text: '我完成了 memora 的香氛性格測驗，來看看你和寵物適合什麼香味！連結:https://4112060022.github.io/candle-quiz/',
            files: [file]
          });
          toast.style.opacity = '0';
        } catch(e) {
          await saveImage();
        }
      }, 'image/png');
    } catch(e) {
      await saveImage();
    }
  } else {
    await saveImage();
  }
}

  if (!navigator.share) {
    const btn = document.getElementById('btn-native-share');
    if (btn) btn.style.display = 'none';
